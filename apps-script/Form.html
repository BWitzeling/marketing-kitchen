<!doctype html>
<html lang="de">
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root { --paper:#f5efe5; --ink:#1f2722; --accent:#d9512c; --line:rgba(31,39,34,.18); }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font:16px/1.5 system-ui,-apple-system,"Segoe UI",sans-serif; }
    main { width:min(100% - 2rem,720px); margin:0 auto; padding:2.5rem 0 5rem; }
    .eyebrow { color:#9f3217; font-size:.75rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; }
    h1 { margin:.3rem 0 1rem; font:500 clamp(2.5rem,9vw,4.8rem)/.95 Georgia,serif; letter-spacing:-.05em; }
    .intro { color:#68706a; margin-bottom:2rem; }
    form { display:grid; gap:1.15rem; padding:clamp(1.25rem,4vw,2.5rem); border:1px solid var(--line); border-radius:24px; background:#fffdf8; box-shadow:0 20px 60px rgba(65,50,35,.09); }
    label { display:grid; gap:.45rem; font-weight:700; }
    small { color:#727872; font-weight:400; }
    input, textarea, select { width:100%; border:1px solid var(--line); border-radius:12px; padding:.85rem .95rem; background:white; color:var(--ink); font:inherit; }
    textarea { min-height:150px; resize:vertical; }
    input:focus, textarea:focus, select:focus { outline:3px solid rgba(217,81,44,.18); border-color:var(--accent); }
    .row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    .check { display:flex; align-items:center; gap:.65rem; font-weight:600; }
    .check input { width:auto; }
    .preview { display:none; border-radius:16px; overflow:hidden; aspect-ratio:4/3; background:#e8dfd2; }
    .preview img { width:100%; height:100%; object-fit:cover; }
    button { border:0; border-radius:999px; padding:1rem 1.3rem; background:var(--ink); color:white; font:700 1rem system-ui; cursor:pointer; }
    button:hover { background:#9f3217; }
    button:disabled { opacity:.55; cursor:wait; }
    #status { min-height:1.5rem; margin:0; font-weight:700; }
    #status.error { color:#a11f15; }
    #status.success { color:#225f3c; }
    @media(max-width:600px){ .row{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">Marketing-Kitchen Publisher</p>
    <h1>Neue Empfehlung</h1>
    <p class="intro">Beitrag ausfüllen, Bild auswählen und direkt im GitHub-Repository veröffentlichen.</p>

    <form id="post-form">
      <label>
        Titel
        <input name="title" maxlength="120" required placeholder="z. B. Küchenmesser von Global">
      </label>

      <div class="row">
        <label>
          Kategorie
          <select name="category" required>
            <option value="kueche">Küchen-Hardware</option>
            <option value="restaurant">Restaurants</option>
            <option value="tech">Tech-Gadgets</option>
          </select>
        </label>
        <label>
          Badge <small>optional</small>
          <input name="badge" maxlength="80" placeholder="z. B. Persönlicher Favorit">
        </label>
      </div>

      <label>
        Persönliche Empfehlung
        <textarea name="excerpt" maxlength="900" required placeholder="Warum ist dieser Ort oder dieses Produkt eine Empfehlung?"></textarea>
      </label>

      <div class="row">
        <label>
          Link <small>optional</small>
          <input name="url" type="url" placeholder="https://…">
        </label>
        <label>
          Linktext <small>optional</small>
          <input name="linkText" maxlength="80" placeholder="z. B. Produkt ansehen">
        </label>
      </div>

      <label>
        Bild
        <input id="image" name="image" type="file" accept="image/jpeg,image/png,image/webp" required>
        <small>Das Bild wird vor dem Upload automatisch auf maximal 1600 Pixel verkleinert.</small>
      </label>
      <div class="preview" id="preview"><img alt="Vorschau"></div>

      <label>
        Bildbeschreibung <small>für Barrierefreiheit, optional</small>
        <input name="imageAlt" maxlength="160" placeholder="z. B. Global Küchenmesser auf einem Holzbrett">
      </label>

      <label class="check">
        <input name="featured" type="checkbox">
        Beitrag auf der Startseite hervorheben
      </label>

      <button id="submit-button" type="submit">Beitrag veröffentlichen</button>
      <p id="status" role="status" aria-live="polite"></p>
    </form>
  </main>

  <script>
    const form = document.querySelector("#post-form");
    const imageInput = document.querySelector("#image");
    const preview = document.querySelector("#preview");
    const previewImage = preview.querySelector("img");
    const submitButton = document.querySelector("#submit-button");
    const status = document.querySelector("#status");
    let optimizedImage = null;

    imageInput.addEventListener("change", async () => {
      status.textContent = "";
      optimizedImage = null;
      const file = imageInput.files[0];
      if (!file) return;
      try {
        optimizedImage = await resizeImage(file, 1600, 0.84);
        previewImage.src = optimizedImage.dataUrl;
        preview.style.display = "block";
      } catch (error) {
        setStatus(error.message || "Bild konnte nicht verarbeitet werden.", true);
      }
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (!optimizedImage) {
        setStatus("Bitte zuerst ein Bild auswählen.", true);
        return;
      }

      submitButton.disabled = true;
      setStatus("Beitrag wird veröffentlicht …");
      const data = new FormData(form);
      const payload = {
        title: data.get("title"),
        category: data.get("category"),
        badge: data.get("badge"),
        excerpt: data.get("excerpt"),
        url: data.get("url"),
        linkText: data.get("linkText"),
        imageAlt: data.get("imageAlt"),
        featured: data.get("featured") === "on",
        imageDataUrl: optimizedImage.dataUrl,
        imageName: optimizedImage.name
      };

      google.script.run
        .withSuccessHandler((result) => {
          setStatus(result.message || "Beitrag veröffentlicht.", false, true);
          form.reset();
          optimizedImage = null;
          preview.style.display = "none";
          submitButton.disabled = false;
        })
        .withFailureHandler((error) => {
          setStatus(error.message || "Veröffentlichung fehlgeschlagen.", true);
          submitButton.disabled = false;
        })
        .submitPostFromForm(payload);
    });

    function setStatus(message, isError = false, isSuccess = false) {
      status.textContent = message;
      status.className = isError ? "error" : (isSuccess ? "success" : "");
    }

    function resizeImage(file, maxSize, quality) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onerror = () => reject(new Error("Bilddatei konnte nicht gelesen werden."));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error("Dieses Bildformat wird nicht unterstützt."));
          img.onload = () => {
            const scale = Math.min(1, maxSize / Math.max(img.width, img.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.round(img.width * scale);
            canvas.height = Math.round(img.height * scale);
            const context = canvas.getContext("2d", { alpha: false });
            context.drawImage(img, 0, 0, canvas.width, canvas.height);
            const dataUrl = canvas.toDataURL("image/jpeg", quality);
            resolve({ dataUrl, name: file.name.replace(/\.[^.]+$/, "") + ".jpg" });
          };
          img.src = reader.result;
        };
        reader.readAsDataURL(file);
      });
    }
  </script>
</body>
</html>
